apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: pdfs
spec:
  replicas: 1 # backend pod를 항상 1개 유지해라
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: melooong/pdfs-backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: pdfs-secret
                  key: DATABASE_URL
          ports:
            - containerPort: 8010
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8010
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8010
            initialDelaySeconds: 5
            periodSeconds: 10
